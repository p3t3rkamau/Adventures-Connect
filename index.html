<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Adventures Connect | East Africa Safari Tours & Packages</title>
    <meta name="description" content="Adventures Connect offers premium safari tours across Kenya, Tanzania, Uganda, Rwanda, Botswana, Zambia & Zimbabwe. Tailor-made wildlife safaris, beach holidays & cultural tours. Book your African adventure today." />
    <meta name="keywords" content="safari tours, Kenya safari, Tanzania safari, East Africa safari, wildlife tours, Maasai Mara, Serengeti, gorilla trekking, African safari packages, luxury safari" />
    <meta name="author" content="Adventures Connect" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Adventures Connect" />
    <meta property="og:title" content="Adventures Connect | East Africa Safari Tours & Packages" />
    <meta property="og:description" content="Premium safari tours across East & Southern Africa. Maasai Mara, Serengeti, gorilla trekking, beach holidays and more. Tailor-made itineraries for 2+ travellers." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://www.adventuresconnect.co.ke" />
    <meta property="og:locale" content="en_KE" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Adventures Connect | East Africa Safari Tours" />
    <meta name="twitter:description" content="Premium safari tours across East & Southern Africa. Maasai Mara, Serengeti, gorilla trekking & beach holidays." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.adventuresconnect.co.ke" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.ico" />

    <!-- Preconnect for external image domains -->
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- JSON-LD: Organization structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "Adventures Connect",
      "url": "https://www.adventuresconnect.co.ke",
      "logo": "https://www.adventuresconnect.co.ke/logo.png",
      "description": "Premium safari tours and tailor-made African travel experiences across Kenya, Tanzania, Uganda, Rwanda, Botswana, Zambia and Zimbabwe.",
      "telephone": "+254721949410",
      "email": "info@adventuresconnect.co.ke",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "KE",
        "addressLocality": "Nairobi"
      },
      "sameAs": [
        "https://www.facebook.com/adventuresconnect",
        "https://www.instagram.com/adventuresconnect"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
